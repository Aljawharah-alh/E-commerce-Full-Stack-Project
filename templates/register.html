{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 card p-4 shadow-sm border-0" style="border-radius: 20px;">
        <h2 class="text-center mb-4" style="color: var(--accent);">إنشاء حساب جديد</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-login w-100 mt-3">إنشاء الحساب</button>
        </form>
        <p class="text-center mt-3 small">لديكِ حساب بالفعل؟ <a href="{% url 'login' %}" style="color: var(--accent);">سجلي دخولك</a></p>
    </div>
</div>
{% endblock %}
